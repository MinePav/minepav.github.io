<body style="display: flex">
  <header>
    <a href="index.html" class="logo"><i class="ri-game-line"></i><span>BestGames</span></a>

    <ul class="navbar">
        <li><a href="index.html">Главная</a></li>
        <li><a href="play.html" >Игры</a></li>
        <li><a href="#">О нас</a></li>
    </ul>

    <div class="main">
        <a href="#" class="user"><i class="ri-user-shared-2-line"></i>Login</a>
        <a href="#">1000</a>
        <div class="bx bx-menu" id="menu-icon"></div>
    </div>
  </header>

  <div class="wrapper">
    <div class="title-text">
      <div class="title login">Login</div>
      <div class="title signup">Sign Up</div>
    </div>
    <div class="form-container">
      <div class="slide-controls">
        <input type="radio" name="slide" id="login" checked>
        <input type="radio" name="slide" id="signup">
        <label for="login" class="slide login" style="color: #fff;">Login</label>
        <label for="signup" class="slide signup" style="color: #fff;">Sign Up</label>
        <div class="slider-tab"></div>
      </div>
      <div class="form-inner">
        <form id="loginForm" class="login" action="login.php" method="POST">
          <div class="field">
              <input type="text" name="email" placeholder="Email Address" required>
          </div>
          <div class="field">
              <input type="password" name="password" placeholder="Password" required>
          </div>
          <div class="field btn">
              <div class="btn-layer"></div>
              <input type="submit" value="Login">
          </div>
      </form>
      
      <form id="signupForm" class="signup" action="register.php" method="POST">
          <div class="field">
              <input type="text" name="email" placeholder="Email Address" required>
          </div>
          <div class="field">
              <input type="password" name="password" placeholder="Password" required>
          </div>
          <div class="field">
              <input type="password" name="confirm_password" placeholder="Confirm password" required>
          </div>
          <div class="field btn">
              <div class="btn-layer"></div>
              <input type="submit" value="Signup">
          </div>
      </form>
      
      </div>
    </div>
  </div>
